<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecosystem Documentation — Pi Network Insights</title>
  <meta name="description" content="Browse all specialized articles, checklists, and technical reference modules across the core pillars of the Pi Network blockchain." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://prakashphiroda314.github.io/pinetwork-blog/articles.html" />
  <meta property="og:title" content="Ecosystem Documentation — Pi Network Insights" />
  <meta property="og:description" content="Explore documentation and strategy checklists curated by Prakash Choudhary." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6D28D9', 'primary-dark': '#5B21B6', accent: '#F59E0B' }, fontFamily: { heading: ['Poppins', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script>
    (function() {
      const dark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="bg-white dark:bg-gray-950">
  <div id="header-mount"></div>

  <!-- Hero -->
  <section class="pt-28 pb-12 bg-gradient-to-br from-purple-950 via-purple-900 to-indigo-900">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="max-w-2xl">
        <span class="hero-badge mb-4 inline-flex">
          <span class="dot"></span>
          Knowledge Base
        </span>
        <h1 class="text-4xl lg:text-5xl font-bold text-white mb-4" style="font-family:Poppins">Ecosystem Archive</h1>
        <p class="text-purple-200 text-lg">Structural breakdowns mapping out Node operations, App development cycles, utility commerce, and migration stages.</p>
      </div>
    </div>
  </section>

  <!-- Filter Bar -->
  <section class="sticky top-16 z-40 bg-white/95 dark:bg-gray-950/95 backdrop-blur border-b border-gray-200 dark:border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center gap-3 py-3 overflow-x-auto scrollbar-none">
        <button class="filter-btn active whitespace-nowrap" data-filter="all" onclick="filterArticles('all', this)">All Pillars</button>
        <button class="filter-btn whitespace-nowrap" data-filter="Pi Apps & Utilities" onclick="filterArticles('Pi Apps & Utilities', this)">📱 Apps & Utilities</button>
        <button class="filter-btn whitespace-nowrap" data-filter="Node & Blockchain" onclick="filterArticles('Node & Blockchain', this)">💻 Node & Blockchain</button>
        <button class="filter-btn whitespace-nowrap" data-filter="Pi Commerce & Adoption" onclick="filterArticles('Pi Commerce & Adoption', this)">🛒 Pi Commerce</button>
        <button class="filter-btn whitespace-nowrap" data-filter="Mainnet Migration & KYC" onclick="filterArticles('Mainnet Migration & KYC', this)">🚀 Migration & KYC</button>
      </div>
    </div>
  </section>

  <style>
    .filter-btn {
      padding: 0.5rem 1rem;
      border-radius: 100px;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #6B7280;
      background: transparent;
      border: 1px solid #E5E7EB;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Poppins', sans-serif;
    }
    .filter-btn:hover {
      border-color: #6D28D9;
      color: #6D28D9;
    }
    .filter-btn.active {
      background: #6D28D9;
      color: white;
      border-color: #6D28D9;
    }
    .dark .filter-btn {
      color: #9CA3AF;
      border-color: #374151;
    }
    .dark .filter-btn:hover {
      border-color: #7C3AED;
      color: #C4B5FD;
    }
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <!-- Articles Grid -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <!-- Search Bar -->
    <div class="relative mb-8 animate-on-scroll">
      <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input
        type="search"
        id="article-search"
        class="search-input"
        placeholder="Search updates, optimization metrics, checklists..."
        oninput="handleSearch(this.value)"
      />
    </div>

    <!-- Results Count -->
    <div class="flex items-center justify-between mb-6">
      <p id="results-count" class="text-sm text-gray-500 dark:text-gray-400"></p>
      <div class="flex items-center gap-2">
        <span class="text-sm text-gray-500 dark:text-gray-400">Sort:</span>
        <select id="sort-select" class="text-sm border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-900 text-gray-700 dark:text-gray-300 rounded-lg px-3 py-1.5 outline-none focus:border-purple-500" onchange="sortArticles(this.value)">
          <option value="newest">Newest First</option>
          <option value="popular">Most Popular</option>
          <option value="liked">Most Liked</option>
        </select>
      </div>
    </div>

    <!-- Grid -->
    <div id="articles-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
      <!-- Populated by JS -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-20">
      <div class="text-6xl mb-4">🔍</div>
      <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2" style="font-family:Poppins">No items located</h3>
      <p class="text-gray-500 dark:text-gray-400">Try modifying your query terms or sector filters.</p>
      <button onclick="filterArticles('all', document.querySelector('[data-filter=all]'))" class="btn-outline mt-4 inline-flex">Show All Records</button>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="assets/js/main.js"></script>
  <script>
    let allArticles = [];
    let activeFilter = 'all';
    let activeSort = 'newest';
    let activeQuery = '';

    const urlParams = new URLSearchParams(window.location.search);
    const urlCategory = urlParams.get('category');

    async function initArticlesPage() {
      const data = await initPage('articles');
      allArticles = data.articles || [];

      if (urlCategory) {
        activeFilter = urlCategory;
        const btn = document.querySelector(`[data-filter="${urlCategory}"]`);
        if (btn) {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        }
      }

      renderArticles();
    }

    function renderArticles() {
      let filtered = [...allArticles];

      // Switched to query against the clean string name for perfect matching
      if (activeFilter !== 'all') {
        filtered = filtered.filter(a => a.category === activeFilter);
      }

      if (activeQuery) {
        filtered = searchArticles(activeQuery, filtered);
      }

      if (activeSort === 'popular') {
        filtered.sort((a, b) => b.views - a.views);
      } else if (activeSort === 'liked') {
        filtered.sort((a, b) => b.likes - a.likes);
      } else {
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
      }

      const grid = document.getElementById('articles-grid');
      const emptyState = document.getElementById('empty-state');
      const count = document.getElementById('results-count');

      if (filtered.length === 0) {
        grid.innerHTML = '';
        emptyState.classList.remove('hidden');
        count.textContent = 'No results found';
      } else {
        emptyState.classList.add('hidden');
        grid.innerHTML = filtered.map(a => createArticleCard(a)).join('');
        const noun = filtered.length === 1 ? 'article' : 'articles';
        count.textContent = `${filtered.length} ${noun}`;
        setTimeout(initAnimations, 50);
      }
    }

    function filterArticles(category, btn) {
      activeFilter = category;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderArticles();
    }

    function handleSearch(q) {
      activeQuery = q;
      renderArticles();
    }

    function sortArticles(sort) {
      activeSort = sort;
      renderArticles();
    }

    initArticlesPage();
  </script>
</body>
</html>
