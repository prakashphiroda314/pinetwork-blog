<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — Prakash Knowledge Hub</title>
  <meta name="description" content="Search articles on AI, Pi Network, Web3, Data Analytics and more on Prakash Knowledge Hub." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6D28D9', 'primary-dark': '#5B21B6', accent: '#F59E0B' }, fontFamily: { heading: ['Poppins', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <script>
    (function() {
      const dark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="bg-white dark:bg-gray-950">
  <div id="header-mount"></div>

  <main class="pt-24 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

      <div class="text-center mb-10 animate-on-scroll">
        <span class="section-eyebrow">Search</span>
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mt-3 mb-3" style="font-family:Poppins">Find What You're Looking For</h1>
        <p class="text-gray-500 dark:text-gray-400">Search across articles, categories, tags and authors.</p>
      </div>

      <!-- Search Input -->
      <div class="relative mb-8 animate-on-scroll">
        <svg class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 z-10" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input
          type="search"
          id="search-input"
          class="search-input text-lg py-4 pl-14 pr-6"
          placeholder="Search articles, topics, AI, Pi Network..."
          autofocus
        />
        <button id="clear-btn" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>

      <!-- Quick Topics -->
      <div id="quick-topics" class="flex flex-wrap gap-2 mb-8 animate-on-scroll">
        <span class="text-sm text-gray-500 dark:text-gray-400 mr-2 self-center">Popular:</span>
        <button onclick="setSearch('Artificial Intelligence')" class="tag hover:text-purple-600">🤖 AI</button>
        <button onclick="setSearch('Pi Network')" class="tag hover:text-purple-600">π Pi Network</button>
        <button onclick="setSearch('Web3')" class="tag hover:text-purple-600">⛓️ Web3</button>
        <button onclick="setSearch('Data Analytics')" class="tag hover:text-purple-600">📊 Data</button>
        <button onclick="setSearch('LinkedIn')" class="tag hover:text-purple-600">✨ Branding</button>
        <button onclick="setSearch('Agriculture')" class="tag hover:text-purple-600">🌾 Agri</button>
        <button onclick="setSearch('ChatGPT')" class="tag hover:text-purple-600">ChatGPT</button>
        <button onclick="setSearch('career')" class="tag hover:text-purple-600">Career</button>
      </div>

      <!-- Results Count -->
      <div id="search-meta" class="text-sm text-gray-500 dark:text-gray-400 mb-6 hidden"></div>

      <!-- Results -->
      <div id="search-results" class="space-y-4"></div>

      <!-- Empty State -->
      <div id="no-results" class="hidden text-center py-16">
        <div class="text-6xl mb-4">🔍</div>
        <h3 class="text-xl font-bold text-gray-900 dark:text-white mb-2" style="font-family:Poppins">No results found</h3>
        <p class="text-gray-500 dark:text-gray-400 mb-4">Try different keywords or explore our categories.</p>
        <a href="/categories.html" class="btn-outline inline-flex">Browse Categories</a>
      </div>

      <!-- Initial State -->
      <div id="initial-state" class="text-center py-12">
        <div class="text-5xl mb-6">💡</div>
        <h3 class="text-lg font-semibold text-gray-700 dark:text-gray-300 mb-6" style="font-family:Poppins">Explore Knowledge Domains</h3>
        <div id="initial-categories" class="grid grid-cols-2 sm:grid-cols-4 gap-3">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="/assets/js/main.js"></script>
  <script>
    let allArticles = [];

    function createSearchResult(article) {
      return `
        <a href="/article.html?slug=${article.slug}" class="flex gap-4 p-4 rounded-xl border border-gray-200 dark:border-gray-800 hover:border-purple-300 dark:hover:border-purple-700 transition-all group bg-white dark:bg-gray-900">
          <img src="${article.coverImage}" alt="${article.title}" class="w-20 h-16 object-cover rounded-lg flex-shrink-0" loading="lazy" />
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="category-badge text-xs">${article.category}</span>
              <time class="text-xs text-gray-400">${formatDate(article.date)}</time>
            </div>
            <h3 class="font-semibold text-gray-900 dark:text-white group-hover:text-purple-600 dark:group-hover:text-purple-400 transition-colors text-sm leading-snug mb-1" style="font-family:Poppins">${article.title}</h3>
            <p class="text-gray-500 dark:text-gray-400 text-xs line-clamp-1">${article.excerpt}</p>
            <div class="flex items-center gap-3 mt-2 text-xs text-gray-400">
              <span>${getReadingTime(article.readTime)}</span>
              <span>${formatNumber(article.views)} views</span>
            </div>
          </div>
        </a>
      `;
    }

    function performSearch(query) {
      const results = document.getElementById('search-results');
      const noResults = document.getElementById('no-results');
      const meta = document.getElementById('search-meta');
      const initial = document.getElementById('initial-state');
      const clearBtn = document.getElementById('clear-btn');

      clearBtn.classList.toggle('hidden', !query.trim());

      if (!query.trim()) {
        results.innerHTML = '';
        noResults.classList.add('hidden');
        meta.classList.add('hidden');
        initial.classList.remove('hidden');
        return;
      }

      initial.classList.add('hidden');
      const found = searchArticles(query, allArticles);

      if (found.length === 0) {
        results.innerHTML = '';
        noResults.classList.remove('hidden');
        meta.textContent = `No results for "${query}"`;
        meta.classList.remove('hidden');
      } else {
        noResults.classList.add('hidden');
        results.innerHTML = found.map(a => createSearchResult(a)).join('');
        meta.textContent = `${found.length} result${found.length !== 1 ? 's' : ''} for "${query}"`;
        meta.classList.remove('hidden');
      }
    }

    function setSearch(q) {
      const input = document.getElementById('search-input');
      input.value = q;
      performSearch(q);
    }

    async function initSearchPage() {
      const data = await initPage('');
      allArticles = data.articles || [];

      // Initial categories
      const cats = [
        { name: 'AI', slug: 'Artificial Intelligence', icon: '🤖' },
        { name: 'Pi Network', slug: 'Pi Network', icon: 'π' },
        { name: 'Web3', slug: 'Web3', icon: '⛓️' },
        { name: 'Data', slug: 'Data Analytics', icon: '📊' },
        { name: 'Branding', slug: 'Personal Branding', icon: '✨' },
        { name: 'Growth', slug: 'Digital Growth', icon: '🚀' },
        { name: 'Education', slug: 'Education', icon: '🎓' },
        { name: 'Agri-Tech', slug: 'Agri-Tech', icon: '🌾' },
      ];
      document.getElementById('initial-categories').innerHTML = cats.map(c => `
        <button onclick="setSearch('${c.slug}')" class="flex flex-col items-center gap-1 p-3 rounded-xl border border-gray-200 dark:border-gray-800 hover:border-purple-300 dark:hover:border-purple-700 transition-all cursor-pointer bg-white dark:bg-gray-900">
          <span class="text-2xl">${c.icon}</span>
          <span class="text-xs font-medium text-gray-700 dark:text-gray-300">${c.name}</span>
        </button>
      `).join('');

      // Check URL params
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        document.getElementById('search-input').value = q;
        performSearch(q);
      }

      // Search input handler
      const searchInput = document.getElementById('search-input');
      let debounceTimer;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => performSearch(e.target.value), 200);
      });

      document.getElementById('clear-btn').addEventListener('click', () => {
        searchInput.value = '';
        performSearch('');
        searchInput.focus();
      });

      initAnimations();
    }

    initSearchPage();
  </script>
</body>
</html>
