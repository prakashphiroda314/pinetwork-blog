<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecosystem Hub — Pi Network Insights</title>
  <meta name="description" content="Explore technical documentation, deployment guides, and marketplace trends across the core sectors of the Pi Network ecosystem." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://prakash-knowledge-hub.netlify.app/categories.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6D28D9', 'primary-dark': '#5B21B6', accent: '#F59E0B' }, fontFamily: { heading: ['Poppins', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <script>
    (function() {
      const dark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="bg-white dark:bg-gray-950">
  <div id="header-mount"></div>

  <!-- Hero -->
  <section class="pt-28 pb-16 bg-gradient-to-br from-purple-950 via-purple-900 to-indigo-900">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <span class="hero-badge mb-6 inline-flex"><span class="dot"></span>Ecosystem Pillars</span>
      <h1 class="text-4xl lg:text-5xl font-bold text-white mb-4" style="font-family:Poppins">Pi Network Hub</h1>
      <p class="text-purple-200 text-lg max-w-2xl mx-auto">Four core structural sectors, packed with deployment resources, optimization telemetry, and migration tracking dashboards.</p>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <!-- Category Cards -->
    <div id="category-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-20">
      <!-- Populated by JS -->
    </div>

    <!-- Per Category Article Sections -->
    <div id="category-sections" class="space-y-20">
      <!-- Populated by JS -->
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="./assets/js/main.js"></script>
  <script>
    // Configured exclusively to handle the 4 Pi Network Sub-Topics
    const CATEGORY_DATA = [
      { name: 'Pi Apps & Utilities', slug: 'pi-apps-utilities', icon: '📱', desc: 'Pi browser ecosystem projects, developer environments, and interface tooling resources.', color: '#6D28D9', bg: 'from-purple-600 to-purple-800' },
      { name: 'Node & Blockchain', slug: 'node-blockchain', icon: '💻', desc: 'Node client telemetry configurations, network docker setups, ports mapping, and validator protocols.', color: '#7C3AED', bg: 'from-violet-600 to-violet-800' },
      { name: 'Pi Commerce & Adoption', slug: 'pi-commerce-adoption', icon: '🛒', desc: 'Global peer-to-peer commerce trackers, local merchant integration maps, and transaction processing guidelines.', color: '#8B5CF6', bg: 'from-purple-500 to-indigo-700' },
      { name: 'Mainnet Migration & KYC', slug: 'mainnet-migration-kyc', icon: '🚀', desc: 'Open Mainnet migration checklists, decentralized identity verification steps, and smart-wallet security structures.', color: '#F59E0B', bg: 'from-yellow-500 to-amber-700' }
    ];

    const hash = window.location.hash.replace('#', '');

    async function initCategoriesPage() {
      const data = await initPage('categories');
      const articles = data.articles || [];

      // Category cards matching on strict structural category string names
      const cardsHtml = CATEGORY_DATA.map(cat => {
        const count = articles.filter(a => a.category === cat.name).length;
        return `
          <a href="#${cat.slug}" class="topic-card animate-on-scroll group" onclick="document.getElementById('${cat.slug}').scrollIntoView({behavior:'smooth'});return false;">
            <span class="topic-icon text-4xl mb-3 block">${cat.icon}</span>
            <h3 class="font-bold text-gray-900 dark:text-white mb-1 text-sm leading-snug" style="font-family:Poppins">${cat.name}</h3>
            <p class="text-gray-500 dark:text-gray-400 text-xs mb-3 leading-relaxed">${cat.desc.split('.')[0]}.</p>
            <span class="inline-block text-xs font-semibold px-2 py-1 rounded-full" style="background:${cat.color}18;color:${cat.color}">${count} article${count !== 1 ? 's' : ''}</span>
          </a>
        `;
      }).join('');
      document.getElementById('category-cards').innerHTML = cardsHtml;

      // Category sections listing matching filter items
      const sectionsHtml = CATEGORY_DATA.map(cat => {
        const catArticles = articles.filter(a => a.category === cat.name);
        if (!catArticles.length) return '';
        return `
          <section id="${cat.slug}" class="animate-on-scroll scroll-mt-24">
            <div class="flex items-center gap-4 mb-8">
              <div class="w-14 h-14 rounded-2xl bg-gradient-to-br ${cat.bg} flex items-center justify-center text-2xl shadow-lg">
                ${cat.icon}
              </div>
              <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white" style="font-family:Poppins">${cat.name}</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm">${catArticles.length} article${catArticles.length !== 1 ? 's' : ''} · ${cat.desc}</p>
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              ${catArticles.map(a => createArticleCard(a)).join('')}
            </div>
          </section>
        `;
      }).join('');
      document.getElementById('category-sections').innerHTML = sectionsHtml;

      setTimeout(() => {
        initAnimations();
        if (hash) {
          const el = document.getElementById(hash);
          if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth' }), 500);
        }
      }, 100);
    }

    initCategoriesPage();
  </script>
</body>
</html>
