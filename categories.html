<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Categories — Prakash Knowledge Hub</title>
  <meta name="description" content="Explore articles by category on Prakash Knowledge Hub — AI, Pi Network, Web3, Data Analytics, Personal Branding, Digital Growth, Education and Agri-Tech." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://prakash-knowledge-hub.netlify.app/categories.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6D28D9', 'primary-dark': '#5B21B6', accent: '#F59E0B' }, fontFamily: { heading: ['Poppins', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } }
  </script>
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <script>
    (function() {
      const dark = localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>
</head>
<body class="bg-white dark:bg-gray-950">
  <div id="header-mount"></div>

  <!-- Hero -->
  <section class="pt-28 pb-16 bg-gradient-to-br from-purple-950 via-purple-900 to-indigo-900">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <span class="hero-badge mb-6 inline-flex"><span class="dot"></span>Knowledge Domains</span>
      <h1 class="text-4xl lg:text-5xl font-bold text-white mb-4" style="font-family:Poppins">Browse by Category</h1>
      <p class="text-purple-200 text-lg max-w-2xl mx-auto">Eight focused knowledge domains, each with in-depth articles, insights and practical guidance.</p>
    </div>
  </section>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <!-- Category Cards -->
    <div id="category-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-20">
      <!-- Populated by JS -->
    </div>

    <!-- Per Category Article Sections -->
    <div id="category-sections" class="space-y-20">
      <!-- Populated by JS -->
    </div>
  </main>

  <div id="footer-mount"></div>

  <script src="/assets/js/main.js"></script>
  <script>
    const CATEGORY_DATA = [
      { name: 'Artificial Intelligence', slug: 'artificial-intelligence', icon: '🤖', desc: 'AI tools, machine learning, ChatGPT, and the future of intelligent systems.', color: '#6D28D9', bg: 'from-purple-600 to-purple-800' },
      { name: 'Pi Network', slug: 'pi-network', icon: 'π', desc: 'Everything about Pi Network — mining, KYC, mainnet, ecosystem and opportunities.', color: '#7C3AED', bg: 'from-violet-600 to-violet-800' },
      { name: 'Web3 & Blockchain', slug: 'web3-blockchain', icon: '⛓️', desc: 'Decentralized web, DeFi, NFTs, DAOs, smart contracts and blockchain fundamentals.', color: '#8B5CF6', bg: 'from-purple-500 to-indigo-700' },
      { name: 'Data Analytics', slug: 'data-analytics', icon: '📊', desc: 'Data skills, tools (Power BI, Python, SQL), visualization, and storytelling with data.', color: '#A78BFA', bg: 'from-violet-500 to-purple-700' },
      { name: 'Personal Branding', slug: 'personal-branding', icon: '✨', desc: 'Building an authentic digital presence, LinkedIn strategy, and long-term brand equity.', color: '#F59E0B', bg: 'from-yellow-500 to-amber-700' },
      { name: 'Digital Growth', slug: 'digital-growth', icon: '🚀', desc: 'Content strategy, audience growth, SEO, YouTube, and monetization for creators.', color: '#EF4444', bg: 'from-red-500 to-rose-700' },
      { name: 'Education', slug: 'education', icon: '🎓', desc: 'EdTech, AI in classrooms, future of learning, and making education accessible.', color: '#10B981', bg: 'from-emerald-500 to-teal-700' },
      { name: 'Agri-Tech', slug: 'agri-tech', icon: '🌾', desc: 'Precision farming, AI in agriculture, blockchain supply chains, and smart farming.', color: '#059669', bg: 'from-green-600 to-emerald-800' },
    ];

    // Check URL anchor
    const hash = window.location.hash.replace('#', '');

    async function initCategoriesPage() {
      const data = await initPage('categories');
      const articles = data.articles || [];

      // Category cards
      const cardsHtml = CATEGORY_DATA.map(cat => {
        const count = articles.filter(a => a.categorySlug === cat.slug).length;
        return `
          <a href="#${cat.slug}" class="topic-card animate-on-scroll group" onclick="document.getElementById('${cat.slug}').scrollIntoView({behavior:'smooth'});return false;">
            <span class="topic-icon text-4xl mb-3 block">${cat.icon}</span>
            <h3 class="font-bold text-gray-900 dark:text-white mb-1 text-sm leading-snug" style="font-family:Poppins">${cat.name}</h3>
            <p class="text-gray-500 dark:text-gray-400 text-xs mb-3 leading-relaxed">${cat.desc.split('.')[0]}.</p>
            <span class="inline-block text-xs font-semibold px-2 py-1 rounded-full" style="background:${cat.color}18;color:${cat.color}">${count} article${count !== 1 ? 's' : ''}</span>
          </a>
        `;
      }).join('');
      document.getElementById('category-cards').innerHTML = cardsHtml;

      // Category sections with articles
      const sectionsHtml = CATEGORY_DATA.map(cat => {
        const catArticles = articles.filter(a => a.categorySlug === cat.slug);
        if (!catArticles.length) return '';
        return `
          <section id="${cat.slug}" class="animate-on-scroll scroll-mt-24">
            <div class="flex items-center gap-4 mb-8">
              <div class="w-14 h-14 rounded-2xl bg-gradient-to-br ${cat.bg} flex items-center justify-center text-2xl shadow-lg">
                ${cat.icon}
              </div>
              <div>
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white" style="font-family:Poppins">${cat.name}</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm">${catArticles.length} article${catArticles.length !== 1 ? 's' : ''} · ${cat.desc}</p>
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              ${catArticles.map(a => createArticleCard(a)).join('')}
            </div>
          </section>
        `;
      }).join('');
      document.getElementById('category-sections').innerHTML = sectionsHtml;

      setTimeout(() => {
        initAnimations();
        // Scroll to hash if present
        if (hash) {
          const el = document.getElementById(hash);
          if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth' }), 500);
        }
      }, 100);
    }

    initCategoriesPage();
  </script>
</body>
</html>
